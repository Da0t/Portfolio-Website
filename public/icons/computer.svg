<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Monitor body -->
  <rect x="4" y="2" width="24" height="18" fill="#C0C0C0"/>
  <rect x="4" y="2" width="24" height="1" fill="#FFFFFF"/>
  <rect x="4" y="2" width="1" height="18" fill="#FFFFFF"/>
  <rect x="27" y="2" width="1" height="18" fill="#808080"/>
  <rect x="4" y="19" width="24" height="1" fill="#808080"/>
  <!-- Screen bezel -->
  <rect x="6" y="4" width="20" height="14" fill="#000080"/>
  <rect x="6" y="4" width="20" height="1" fill="#404040"/>
  <rect x="6" y="4" width="1" height="14" fill="#404040"/>
  <!-- Screen content -->
  <rect x="7" y="5" width="18" height="12" fill="#008080"/>
  <!-- Screen shine -->
  <rect x="8" y="6" width="6" height="2" fill="#00C0C0" opacity="0.4"/>
  <!-- Monitor base neck -->
  <rect x="13" y="20" width="6" height="3" fill="#C0C0C0"/>
  <rect x="13" y="20" width="1" height="3" fill="#FFFFFF"/>
  <rect x="18" y="20" width="1" height="3" fill="#808080"/>
  <!-- Monitor stand -->
  <rect x="8" y="23" width="16" height="3" fill="#C0C0C0"/>
  <rect x="8" y="23" width="16" height="1" fill="#FFFFFF"/>
  <rect x="8" y="25" width="16" height="1" fill="#808080"/>
  <!-- Keyboard -->
  <rect x="4" y="27" width="24" height="4" fill="#C0C0C0"/>
  <rect x="4" y="27" width="24" height="1" fill="#FFFFFF"/>
  <rect x="4" y="30" width="24" height="1" fill="#808080"/>
  <rect x="4" y="27" width="1" height="4" fill="#FFFFFF"/>
  <rect x="27" y="27" width="1" height="4" fill="#808080"/>
  <!-- Keyboard keys -->
  <rect x="6" y="29" width="2" height="1" fill="#808080"/>
  <rect x="9" y="29" width="2" height="1" fill="#808080"/>
  <rect x="12" y="29" width="2" height="1" fill="#808080"/>
  <rect x="15" y="29" width="4" height="1" fill="#808080"/>
  <rect x="20" y="29" width="2" height="1" fill="#808080"/>
  <rect x="23" y="29" width="2" height="1" fill="#808080"/>
</svg>
