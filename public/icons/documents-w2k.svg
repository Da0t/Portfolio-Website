<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Folder back -->
  <rect x="1" y="8" width="28" height="20" fill="#E8B840"/>
  <rect x="1" y="8" width="28" height="1" fill="#F8D060"/>
  <rect x="1" y="8" width="1" height="20" fill="#F8D060"/>
  <rect x="28" y="8" width="1" height="20" fill="#A07020"/>
  <rect x="1" y="27" width="28" height="1" fill="#A07020"/>
  <!-- Folder tab -->
  <rect x="1" y="5" width="12" height="4" fill="#E8B840"/>
  <rect x="1" y="5" width="12" height="1" fill="#F8D060"/>
  <rect x="1" y="5" width="1" height="4" fill="#F8D060"/>
  <rect x="12" y="5" width="1" height="3" fill="#C09030"/>
  <!-- Folder front (open flap) -->
  <rect x="1" y="14" width="28" height="13" fill="#F0C040"/>
  <rect x="1" y="14" width="28" height="1" fill="#FFFFFF" opacity="0.5"/>
  <!-- Document inside folder -->
  <rect x="8" y="9" width="14" height="16" fill="#FFFFFF"/>
  <rect x="8" y="9" width="14" height="1" fill="#C0C0C0"/>
  <rect x="8" y="9" width="1" height="16" fill="#C0C0C0"/>
  <rect x="21" y="9" width="1" height="16" fill="#808080"/>
  <rect x="8" y="24" width="14" height="1" fill="#808080"/>
  <!-- Dog-ear -->
  <rect x="18" y="9" width="4" height="4" fill="#D8D8D8"/>
  <line x1="18" y1="9" x2="22" y2="13" stroke="#808080" stroke-width="1"/>
  <!-- Text lines on doc -->
  <rect x="10" y="14" width="8" height="1" fill="#4080C0"/>
  <rect x="10" y="16" width="9" height="1" fill="#C0C0C0"/>
  <rect x="10" y="18" width="7" height="1" fill="#C0C0C0"/>
  <rect x="10" y="20" width="9" height="1" fill="#C0C0C0"/>
  <!-- Shadow -->
  <rect x="29" y="9" width="2" height="19" fill="#A07020" opacity="0.4"/>
  <rect x="2" y="28" width="29" height="2" fill="#A07020" opacity="0.4"/>
</svg>
