<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Windows logo 4-pane flag -->
  <rect x="1" y="1" width="6" height="6" fill="#FF0000"/>
  <rect x="8" y="1" width="6" height="6" fill="#00AA00"/>
  <rect x="1" y="8" width="6" height="6" fill="#0000FF"/>
  <rect x="8" y="8" width="6" height="6" fill="#FFCC00"/>
  <!-- Gap between panes -->
  <rect x="7" y="1" width="1" height="13" fill="transparent"/>
  <rect x="1" y="7" width="13" height="1" fill="transparent"/>
</svg>
