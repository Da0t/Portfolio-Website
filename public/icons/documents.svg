<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Back document -->
  <rect x="10" y="4" width="16" height="20" fill="#FFFFFF"/>
  <rect x="10" y="4" width="16" height="1" fill="#808080"/>
  <rect x="10" y="4" width="1" height="20" fill="#808080"/>
  <rect x="25" y="4" width="1" height="20" fill="#808080"/>
  <rect x="10" y="23" width="16" height="1" fill="#808080"/>
  <!-- Shadow -->
  <rect x="12" y="6" width="16" height="20" fill="#808080" opacity="0.3"/>
  <!-- Front document -->
  <rect x="6" y="6" width="16" height="20" fill="#FFFFFF"/>
  <rect x="6" y="6" width="16" height="1" fill="#000000"/>
  <rect x="6" y="6" width="1" height="20" fill="#000000"/>
  <rect x="21" y="6" width="1" height="20" fill="#000000"/>
  <rect x="6" y="25" width="16" height="1" fill="#000000"/>
  <!-- Dog-ear fold -->
  <rect x="17" y="6" width="5" height="5" fill="#C0C0C0"/>
  <rect x="17" y="6" width="1" height="5" fill="#808080"/>
  <rect x="17" y="10" width="5" height="1" fill="#808080"/>
  <polygon points="17,6 22,11 17,11" fill="#C0C0C0"/>
  <line x1="17" y1="6" x2="22" y2="11" stroke="#808080" stroke-width="1"/>
  <!-- Text lines -->
  <rect x="8" y="13" width="10" height="1" fill="#000080"/>
  <rect x="8" y="15" width="10" height="1" fill="#C0C0C0"/>
  <rect x="8" y="17" width="8" height="1" fill="#C0C0C0"/>
  <rect x="8" y="19" width="10" height="1" fill="#C0C0C0"/>
  <rect x="8" y="21" width="6" height="1" fill="#C0C0C0"/>
</svg>
