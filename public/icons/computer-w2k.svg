<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Monitor body -->
  <rect x="3" y="2" width="20" height="16" fill="#D4D0C8"/>
  <rect x="3" y="2" width="20" height="1" fill="#FFFFFF"/>
  <rect x="3" y="2" width="1" height="16" fill="#FFFFFF"/>
  <rect x="22" y="2" width="1" height="16" fill="#808080"/>
  <rect x="3" y="17" width="20" height="1" fill="#808080"/>
  <!-- Screen bezel (inner) -->
  <rect x="5" y="4" width="16" height="11" fill="#4080C0"/>
  <!-- Screen highlight -->
  <rect x="5" y="4" width="16" height="1" fill="#6090D0"/>
  <rect x="5" y="4" width="1" height="11" fill="#6090D0"/>
  <!-- Screen content (teal glow) -->
  <rect x="6" y="5" width="14" height="9" fill="#1060A0"/>
  <rect x="7" y="6" width="5" height="2" fill="#40A0E0" opacity="0.6"/>
  <!-- Monitor chin -->
  <rect x="4" y="15" width="18" height="2" fill="#C0C0C0"/>
  <rect x="8" y="16" width="2" height="1" fill="#00CC00"/>
  <!-- Neck -->
  <rect x="10" y="18" width="6" height="2" fill="#C0C0C0"/>
  <rect x="10" y="18" width="1" height="2" fill="#FFFFFF"/>
  <!-- Base -->
  <rect x="6" y="20" width="14" height="2" fill="#C0C0C0"/>
  <rect x="6" y="20" width="14" height="1" fill="#FFFFFF"/>
  <rect x="6" y="21" width="14" height="1" fill="#808080"/>
  <!-- Tower (right side) -->
  <rect x="24" y="4" width="7" height="18" fill="#D4D0C8"/>
  <rect x="24" y="4" width="7" height="1" fill="#FFFFFF"/>
  <rect x="24" y="4" width="1" height="18" fill="#FFFFFF"/>
  <rect x="30" y="4" width="1" height="18" fill="#808080"/>
  <rect x="24" y="21" width="7" height="1" fill="#808080"/>
  <!-- Drive bay 1 -->
  <rect x="25" y="6" width="5" height="2" fill="#B0ACA4"/>
  <rect x="25" y="6" width="5" height="1" fill="#808080"/>
  <!-- Drive bay 2 -->
  <rect x="25" y="9" width="5" height="2" fill="#B0ACA4"/>
  <rect x="25" y="9" width="5" height="1" fill="#808080"/>
  <!-- Power LED -->
  <rect x="26" y="13" width="2" height="1" fill="#00DD00"/>
  <!-- Keyboard -->
  <rect x="3" y="23" width="20" height="4" fill="#D4D0C8"/>
  <rect x="3" y="23" width="20" height="1" fill="#FFFFFF"/>
  <rect x="3" y="26" width="20" height="1" fill="#808080"/>
  <rect x="5" y="25" width="2" height="1" fill="#A0A0A0"/>
  <rect x="8" y="25" width="8" height="1" fill="#A0A0A0"/>
  <rect x="17" y="25" width="2" height="1" fill="#A0A0A0"/>
</svg>
