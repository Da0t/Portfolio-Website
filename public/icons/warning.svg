<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Light bulb shape -->
  <rect x="12" y="2" width="8" height="2" fill="#FFFF00"/>
  <rect x="10" y="4" width="12" height="2" fill="#FFFF00"/>
  <rect x="8" y="6" width="16" height="2" fill="#FFFF00"/>
  <rect x="7" y="8" width="18" height="8" fill="#FFFF00"/>
  <rect x="8" y="16" width="16" height="2" fill="#FFFF00"/>
  <rect x="9" y="18" width="14" height="2" fill="#FFFF00"/>
  <!-- Bulb base -->
  <rect x="11" y="20" width="10" height="2" fill="#C0C0C0"/>
  <rect x="11" y="22" width="10" height="2" fill="#C0C0C0"/>
  <rect x="12" y="24" width="8" height="2" fill="#C0C0C0"/>
  <!-- Shine -->
  <rect x="10" y="7" width="3" height="5" fill="#FFFFAA" opacity="0.6"/>
  <!-- Exclamation -->
  <rect x="15" y="8" width="2" height="6" fill="#FF8800"/>
  <rect x="15" y="15" width="2" height="2" fill="#FF8800"/>
</svg>
