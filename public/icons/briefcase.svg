<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Handle -->
  <rect x="11" y="4" width="10" height="2" fill="#808080"/>
  <rect x="11" y="4" width="2" height="4" fill="#808080"/>
  <rect x="19" y="4" width="2" height="4" fill="#808080"/>
  <!-- Case body -->
  <rect x="3" y="9" width="26" height="18" fill="#C08000"/>
  <rect x="3" y="9" width="26" height="1" fill="#FFCC00"/>
  <rect x="3" y="9" width="1" height="18" fill="#FFCC00"/>
  <rect x="28" y="9" width="1" height="18" fill="#804000"/>
  <rect x="3" y="26" width="26" height="1" fill="#804000"/>
  <!-- Middle band -->
  <rect x="3" y="17" width="26" height="3" fill="#804000"/>
  <!-- Latch -->
  <rect x="13" y="17" width="6" height="3" fill="#C0C0C0"/>
  <rect x="14" y="18" width="4" height="1" fill="#808080"/>
