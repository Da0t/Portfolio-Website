<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Handle -->
  <rect x="11" y="3" width="10" height="2" fill="#A07840"/>
  <rect x="11" y="3" width="2" height="5" fill="#A07840"/>
  <rect x="19" y="3" width="2" height="5" fill="#A07840"/>
  <rect x="11" y="3" width="10" height="1" fill="#C09850"/>
  <!-- Case body -->
  <rect x="2" y="8" width="28" height="20" fill="#C09040"/>
  <rect x="2" y="8" width="28" height="1" fill="#E0C060"/>
  <rect x="2" y="8" width="1" height="20" fill="#E0C060"/>
  <rect x="29" y="8" width="1" height="20" fill="#806020"/>
  <rect x="2" y="27" width="28" height="1" fill="#806020"/>
  <!-- Case highlight top-left -->
  <rect x="3" y="9" width="6" height="1" fill="#E8C870"/>
  <!-- Middle clasp band -->
  <rect x="2" y="17" width="28" height="3" fill="#906820"/>
  <!-- Latch -->
  <rect x="12" y="16" width="8" height="5" fill="#C8C4BC"/>
  <rect x="12" y="16" width="8" height="1" fill="#FFFFFF"/>
  <rect x="12" y="16" width="1" height="5" fill="#FFFFFF"/>
  <rect x="19" y="16" width="1" height="5" fill="#808080"/>
  <rect x="12" y="20" width="8" height="1" fill="#808080"/>
  <!-- Latch keyhole -->
  <rect x="15" y="17" width="2" height="3" fill="#606060"/>
  <rect x="14" y="18" width="4" height="1" fill="#606060"/>
  <!-- Stitching detail -->
  <rect x="4" y="11" width="2" height="1" fill="#806020" opacity="0.5"/>
  <rect x="4" y="13" width="2" height="1" fill="#806020" opacity="0.5"/>
  <rect x="4" y="21" width="2" height="1" fill="#806020" opacity="0.5"/>
  <rect x="4" y="23" width="2" height="1" fill="#806020" opacity="0.5"/>
  <!-- Shadow -->
  <rect x="30" y="9" width="1" height="19" fill="#806020" opacity="0.5"/>
  <rect x="3" y="28" width="28" height="1" fill="#806020" opacity="0.5"/>
</svg>
