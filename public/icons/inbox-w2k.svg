<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Tray body -->
  <rect x="2" y="16" width="28" height="13" fill="#D4D0C8"/>
  <rect x="2" y="16" width="28" height="1" fill="#FFFFFF"/>
  <rect x="2" y="16" width="1" height="13" fill="#FFFFFF"/>
  <rect x="29" y="16" width="1" height="13" fill="#808080"/>
  <rect x="2" y="28" width="28" height="1" fill="#808080"/>
  <!-- Tray inner well (sunken) -->
  <rect x="4" y="18" width="24" height="8" fill="#B0ACA4"/>
  <rect x="4" y="18" width="24" height="1" fill="#808080"/>
  <rect x="4" y="18" width="1" height="8" fill="#808080"/>
  <rect x="27" y="18" width="1" height="8" fill="#FFFFFF"/>
  <rect x="4" y="25" width="24" height="1" fill="#FFFFFF"/>
  <!-- Envelope in tray -->
  <rect x="6" y="19" width="20" height="12" fill="#FFFFFF"/>
  <rect x="6" y="19" width="20" height="1" fill="#000080"/>
  <rect x="6" y="19" width="1" height="12" fill="#808080"/>
  <rect x="25" y="19" width="1" height="12" fill="#808080"/>
  <rect x="6" y="30" width="20" height="1" fill="#808080"/>
  <!-- Envelope flap V -->
  <polygon points="6,19 16,27 26,19" fill="#C8C4BC" stroke="#808080" stroke-width="0"/>
  <line x1="6" y1="19" x2="16" y2="26" stroke="#808080" stroke-width="1"/>
  <line x1="26" y1="19" x2="16" y2="26" stroke="#808080" stroke-width="1"/>
  <!-- Stamp -->
  <rect x="21" y="20" width="4" height="3" fill="#FF4040"/>
  <rect x="21" y="20" width="4" height="1" fill="#FF8080"/>
  <!-- Return arrow (indicating incoming) -->
  <rect x="10" y="7" width="12" height="2" fill="#0070D0"/>
  <rect x="10" y="7" width="1" height="6" fill="#0070D0"/>
  <rect x="10" y="12" width="5" height="2" fill="#0070D0"/>
  <!-- Arrow head -->
  <rect x="20" y="5" width="2" height="6" fill="#0070D0"/>
  <rect x="18" y="6" width="2" height="1" fill="#0070D0"/>
  <rect x="22" y="6" width="2" height="1" fill="#0070D0"/>
  <rect x="17" y="7" width="1" height="1" fill="#0070D0"/>
  <rect x="24" y="7" width="1" height="1" fill="#0070D0"/>
</svg>
