  <rect x="13" y="22" width="1"  height="8"  fill="#FFFFFF"/>
  <rect x="18" y="22" width="1"  height="8"  fill="#404040"/>
  <!-- Door knob -->
  <rect x="17" y="26" width="1"  height="1"  fill="#FFFF00"/>
