  <rect x="14" y="13" width="4"  height="4"  fill="#000080"/>
  <rect x="21" y="13" width="4"  height="4"  fill="#000080"/>
  <!-- Windows row 2 -->
  <rect x="7"  y="19" width="4"  height="4"  fill="#000080"/>
