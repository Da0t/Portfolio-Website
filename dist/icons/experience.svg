<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Building/office shape -->
  <rect x="4"  y="10" width="24" height="20" fill="#C0C0C0"/>
  <rect x="4"  y="10" width="24" height="1"  fill="#FFFFFF"/>
  <rect x="4"  y="10" width="1"  height="20" fill="#FFFFFF"/>
  <rect x="27" y="10" width="1"  height="20" fill="#808080"/>
  <rect x="4"  y="29" width="24" height="1"  fill="#808080"/>
  <!-- Roof detail -->
  <rect x="2"  y="8"  width="28" height="3"  fill="#808080"/>
  <rect x="2"  y="8"  width="28" height="1"  fill="#FFFFFF"/>
  <rect x="2"  y="8"  width="1"  height="3"  fill="#FFFFFF"/>
