<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Cylinder body (blue, Win2000 style) -->
  <!-- Ellipse top -->
  <rect x="7" y="5" width="18" height="4" fill="#4090D8"/>
  <rect x="5" y="6" width="22" height="2" fill="#50A0E8"/>
  <rect x="7" y="5" width="18" height="1" fill="#80C0FF"/>
  <!-- Cylinder sides -->
  <rect x="5" y="8" width="1" height="16" fill="#2070C0"/>
  <rect x="26" y="8" width="1" height="16" fill="#1050A0"/>
  <rect x="6" y="8" width="20" height="16" fill="#3080D0"/>
  <!-- Highlight on left of cylinder -->
  <rect x="6" y="8" width="3" height="16" fill="#60A8E8"/>
  <!-- Shadow on right -->
  <rect x="22" y="8" width="4" height="16" fill="#2060B0"/>
  <!-- Ellipse bottom -->
  <rect x="7" y="23" width="18" height="4" fill="#2070C0"/>
  <rect x="5" y="24" width="22" height="2" fill="#1858A8"/>
  <rect x="7" y="26" width="18" height="1" fill="#1050A0"/>
  <!-- Recycling arrow symbol (white) -->
  <!-- Arrow 1 (top) -->
  <rect x="14" y="11" width="4" height="2" fill="#FFFFFF"/>
  <rect x="13" y="10" width="1" height="1" fill="#FFFFFF"/>
  <rect x="18" y="10" width="1" height="1" fill="#FFFFFF"/>
  <rect x="12" y="12" width="1" height="1" fill="#FFFFFF"/>
  <rect x="19" y="12" width="1" height="1" fill="#FFFFFF"/>
  <!-- Arrow 2 (bottom-left) -->
  <rect x="10" y="16" width="2" height="4" fill="#FFFFFF"/>
  <rect x="9" y="15" width="1" height="1" fill="#FFFFFF"/>
  <rect x="12" y="15" width="1" height="1" fill="#FFFFFF"/>
  <!-- Arrow 3 (bottom-right) -->
  <rect x="19" y="16" width="2" height="4" fill="#FFFFFF"/>
  <rect x="18" y="15" width="1" height="1" fill="#FFFFFF"/>
  <rect x="21" y="15" width="1" height="1" fill="#FFFFFF"/>
  <!-- Center circle -->
  <rect x="14" y="16" width="4" height="4" fill="#FFFFFF"/>
  <rect x="13" y="17" width="6" height="2" fill="#FFFFFF"/>
</svg>
