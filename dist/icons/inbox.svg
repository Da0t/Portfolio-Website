<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Envelope outer -->
  <rect x="3" y="8" width="26" height="18" fill="#FFFFFF"/>
  <rect x="3" y="8" width="26" height="1" fill="#000000"/>
  <rect x="3" y="8" width="1" height="18" fill="#000000"/>
  <rect x="28" y="8" width="1" height="18" fill="#000000"/>
  <rect x="3" y="25" width="26" height="1" fill="#000000"/>
  <!-- Envelope flap (closed V shape) -->
  <polygon points="3,8 16,18 29,8" fill="#C0C0C0" stroke="#000000" stroke-width="0"/>
  <line x1="3" y1="8" x2="16" y2="18" stroke="#808080" stroke-width="1"/>
  <line x1="29" y1="8" x2="16" y2="18" stroke="#808080" stroke-width="1"/>
  <!-- Bottom fold lines -->
  <line x1="3" y1="25" x2="13" y2="17" stroke="#808080" stroke-width="1"/>
  <line x1="29" y1="25" x2="19" y2="17" stroke="#808080" stroke-width="1"/>
  <!-- Small envelope label -->
  <rect x="10" y="19" width="12" height="4" fill="#FFFFFF"/>
  <rect x="10" y="19" width="12" height="1" fill="#C0C0C0"/>
</svg>
